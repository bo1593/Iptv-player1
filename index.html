<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 مشغل كأس العالم لـ IPTV 🏆</title>
    <!-- مكتبة مشغل الفيديو -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <!-- خطوط جوجل الاحترافية -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --wc-maroon: #56042C; /* العنابي الرسمي */
            --wc-gold: #D4AF37;   /* الذهبي الملكي */
            --wc-dark: #1e0210;   /* الخلفية الداكنة */
            --wc-card: #2d071b;   /* لون البطاقات */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }

        body { background-color: var(--wc-dark); color: #ffffff; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        header { 
            background: linear-gradient(135deg, var(--wc-maroon), #2d0016);
            padding: 15px 20px; text-align: center; border-bottom: 3px solid var(--wc-gold); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .header-title { display: flex; align-items: center; justify-content: center; gap: 15px; }
        header h1 { font-size: 22px; font-weight: 900; color: #fff; }
        header h1 span { color: var(--wc-gold); }

        .main-container { display: flex; flex: 1; height: calc(100vh - 80px); overflow: hidden; }

        .player-container { flex: 2; background-color: #000; display: flex; align-items: center; justify-content: center; position: relative; border: 2px solid #2d071b; }
        .video-js { width: 100% !important; height: 100% !important; }

        .vjs-default-skin .vjs-big-play-button {
            background-color: rgba(86, 4, 44, 0.8) !important;
            border-color: var(--wc-gold) !important;
            color: var(--wc-gold) !important;
            border-radius: 50% !important;
            width: 75px !important; height: 75px !important;
            line-height: 71px !important;
        }

        .playlist-sidebar { width: 350px; background-color: var(--wc-card); border-right: 3px solid var(--wc-maroon); display: flex; flex-direction: column; }
        .search-box { padding: 12px; background-color: var(--wc-maroon); border-bottom: 2px solid var(--wc-gold); }
        .search-box input { width: 100%; padding: 8px 15px; background: rgba(0, 0, 0, 0.4); border: 1px solid var(--wc-gold); color: #fff; border-radius: 30px; text-align: right; outline: none; }

        .channels-list { flex: 1; overflow-y: auto; list-style: none; padding: 10px; }
        .channel-item { padding: 12px 15px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: all 0.3s; margin-bottom: 5px; border-radius: 8px; background: rgba(255, 255, 255, 0.02); font-weight: bold; }
        .channel-item:hover { background: linear-gradient(90deg, var(--wc-maroon), transparent); color: var(--wc-gold); }
        .channel-item.active { background: linear-gradient(90deg, var(--wc-maroon), var(--wc-card)); color: var(--wc-gold); border-right: 5px solid var(--wc-gold); }

        @media (max-width: 992px) {
            .main-container { flex-direction: column; }
            .player-container { height: 35vh; }
            .playlist-sidebar { width: 100%; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-title">
            <span style="font-size: 28px;">🏆</span>
            <h1>بث قنوات <span>كأس العالم</span> مباشر</h1>
            <span style="font-size: 28px;">⚽</span>
        </div>
    </header>

    <div class="main-container">
        <div class="player-container">
            <video id="my-video" class="video-js vjs-default-skin vjs-big-play-centered" controls autoplay preload="auto"></video>
        </div>

        <div class="playlist-sidebar">
            <div class="search-box">
                <input type="text" id="searchChannel" placeholder="🔍 ابحث عن قناة..." oninput="filterChannels()">
            </div>
            <ul class="channels-list" id="channelsList">
                <li style="text-align:center; padding: 20px;">جاري تحميل القنوات...</li>
            </ul>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        const player = videojs('my-video');
        let allChannels = [];

        window.onload = () => {
            fetch('playlist.m3u')
                .then(res => res.text())
                .then(text => parseM3u(text))
                .catch(() => document.getElementById('channelsList').innerHTML = '<li style="text-align:center; padding: 20px;">خطأ: تأكد من وجود ملف playlist.m3u</li>');
        };

        function parseM3u(text) {
            const lines = text.split('\n');
            allChannels = [];
            for (let i = 0; i < lines.length; i++) {
                if (lines[i].startsWith('#EXTINF:')) {
                    const name = lines[i].split(',')[1] || 'قناة غير معروفة';
                    const url = lines[i + 1] ? lines[i + 1].trim() : '';
                    if (url.startsWith('http')) allChannels.push({ name, url });
                }
            }
            renderChannels(allChannels);
        }

        function renderChannels(channels) {
            const list = document.getElementById('channelsList');
            list.innerHTML = '';
            channels.forEach(ch => {
                const li = document.createElement('li');
                li.className = 'channel-item';
                li.innerHTML = '⚽ ' + ch.name;
                li.onclick = () => {
                    document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
                    li.classList.add('active');
                    player.src({ src: ch.url, type: 'application/x-mpegURL' });
                    player.play();
                };
                list.appendChild(li);
            });
        }

        function filterChannels() {
            const val = document.getElementById('searchChannel').value.toLowerCase();
            renderChannels(allChannels.filter(c => c.name.toLowerCase().includes(val)));
        }
    </script>
</body>
</html>
