<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BODA IPTV Player</title>
    <!-- Video.js CSS -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        :root { --primary: #e50914; --bg: #0f0f0f; --text: #fff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        .header { padding: 15px; background: #1a1a1a; text-align: center; font-weight: bold; font-size: 1.2rem; }
        
        #video-container { width: 100%; height: 40vh; background: #000; }
        .video-js { width: 100% !important; height: 100% !important; }

        .controls { padding: 10px; }
        #search { width: 95%; padding: 10px; border-radius: 5px; border: none; background: #333; color: white; margin-bottom: 10px; }

        #channel-list { flex: 1; overflow-y: auto; }
        .channel-item { padding: 15px; border-bottom: 1px solid #222; cursor: pointer; transition: 0.3s; }
        .channel-item:hover { background: var(--primary); }
    </style>
</head>
<body>

    <div class="header">مشغل BODA IPTV</div>

    <div id="video-container">
        <video id="my-video" class="video-js vjs-big-play-centered" controls preload="auto"></video>
    </div>

    <div class="controls">
        <input type="text" id="search" placeholder="ابحث عن قناة...">
    </div>

    <div id="channel-list"></div>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        const player = videojs('my-video');
        const listDiv = document.getElementById('channel-list');
        const searchInput = document.getElementById('search');
        let allChannels = [];

        // جلب ملف القنوات
        fetch('playlist.m3u')
            .then(res => res.text())
            .then(data => {
                const lines = data.split('\n');
                for(let i = 0; i < lines.length; i++) {
                    if(lines[i].startsWith('#EXTINF:')) {
                        allChannels.push({
                            name: lines[i].split(',')[1],
                            url: lines[i+1]
                        });
                    }
                }
                renderChannels(allChannels);
            });

        function renderChannels(channels) {
            listDiv.innerHTML = '';
            channels.forEach(ch => {
                const div = document.createElement('div');
                div.className = 'channel-item';
                div.innerText = ch.name;
                div.onclick = () => {
                    player.src({ src: ch.url, type: 'application/x-mpegURL' });
                    player.play();
                };
                listDiv.appendChild(div);
            });
        }

        // خاصية البحث
        searchInput.oninput = (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = allChannels.filter(c => c.name.toLowerCase().includes(val));
            renderChannels(filtered);
        };

        // معالجة الأخطاء
        player.on('error', () => {
            alert("فشل تشغيل القناة! تأكد من الرابط.");
        });
    </script>
</body>
</html>
