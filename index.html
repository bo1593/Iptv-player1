<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>BODA IPTV Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        body { background: #121212; color: #fff; }
        .sidebar { height: 100vh; overflow-y: auto; background: #1e1e1e; }
        .channel-btn { width: 100%; text-align: right; margin-bottom: 5px; border-radius: 0; }
        #video-player { width: 100%; height: 50vh; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <!-- القائمة الجانبية -->
        <div class="col-md-3 sidebar p-3">
            <h4 class="text-danger">BODA STORE TV</h4>
            <div id="categories"></div>
        </div>
        <!-- المشغل -->
        <div class="col-md-9 p-0">
            <video id="my-video" class="video-js vjs-big-play-centered" controls preload="auto" data-setup='{}'></video>
        </div>
    </div>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<script>
    const player = videojs('my-video');
    
    fetch('playlist.m3u')
        .then(res => res.text())
        .then(data => {
            const lines = data.split('\n');
            const categories = {};
            
            for(let i = 0; i < lines.length; i++) {
                if(lines[i].startsWith('#EXTINF')) {
                    const group = lines[i].match(/group-title="([^"]+)"/)[1] || "عام";
                    const name = lines[i].split(',')[1];
                    const url = lines[i+1];
                    
                    if(!categories[group]) categories[group] = [];
                    categories[group].push({name, url});
                }
            }
            render(categories);
        });

    function render(cats) {
        const catDiv = document.getElementById('categories');
        for(let group in cats) {
            catDiv.innerHTML += `<h5>${group}</h5>`;
            cats[group].forEach(ch => {
                catDiv.innerHTML += `<button class="btn btn-outline-light channel-btn" onclick="play('${ch.url}')">${ch.name}</button>`;
            });
        }
    }

    function play(url) {
        player.src({ src: url, type: 'application/x-mpegURL' });
        player.play();
    }
</script>
</body>
</html>
